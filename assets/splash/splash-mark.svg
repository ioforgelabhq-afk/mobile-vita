<svg width="1000" height="360" viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- brand-tokens.md: "the teal→mint gradient is reserved for the brand mark" -->
    <linearGradient id="vitaGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6f8e" />
      <stop offset="100%" stop-color="#35c6b3" />
    </linearGradient>
  </defs>

  <text
    x="500" y="205"
    text-anchor="middle"
    font-family="Hanken Grotesk, Arial Black, Helvetica Neue, sans-serif"
    font-weight="800"
    font-size="168"
    letter-spacing="-6"
    fill="url(#vitaGradient)"
  >VITA</text>

  <text
    x="500" y="270"
    text-anchor="middle"
    font-family="Hanken Grotesk, Helvetica Neue, Arial, sans-serif"
    font-weight="500"
    font-size="32"
    letter-spacing="11"
    fill="#7d949b"
  >A TU LADO</text>
</svg>
